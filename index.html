<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Kernel WASM Demo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #4338ca;
        }
        button:active {
            transform: translateY(1px);
        }
        #sim-canvas {
            background-color: #000;
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            cursor: crosshair;
        }
        #metrics {
            margin-top: 20px;
            padding: 15px;
            background-color: #2a2a2a;
            border-radius: 8px;
            width: 800px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Agentic Kernel Swarm</h1>
    <div id="controls">
        <button id="btn-spawn">Spawn 100 Agents</button>
        <button id="btn-spawn-predator">Spawn Predator</button>
        <button id="btn-spawn-prey">Spawn Prey</button>
        <button id="btn-clear">Clear Swarm</button>
        <button id="btn-rhai">Test Rhai Script</button>
        <label>
            Cursor Gravity:
            <input type="range" id="gravity-slider" min="-1.0" max="1.0" step="0.1" value="0.5">
        </label>
    </div>

    <canvas id="sim-canvas" width="800" height="600"></canvas>

    <div id="metrics">Loading WASM Kernel...</div>

    <script type="module" src="./app.js"></script>
</body>
</html>
